{% extends 'users/base.html' %}

{% block title %}

Login

{% endblock %}


{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>Mirela777</h1>
        <p class="subtitle">
            Влез в своя профил
        </p>


        <form method="POST">

            {% csrf_token %}
            {{ form.non_field_errors }}

            <div class="input-group">
                <label>Имейл</label>
                <input
                        type="email"
                        name="username"
                        placeholder="example@email.com">
            </div>


            <div class="input-group">

                <label>Парола</label>

                <input
                        type="password"
                        name="password"
                        placeholder="••••••••">

            </div>


            <button type="submit">
                Вход
            </button>

        </form>


        <div class="switch">

            Нямаш профил?
            <div class="switch">
                Нямаш профил? <a href="{% url 'register' %}">Регистрирай се тук</a>
            </div>

        </div>


        <div>
            <p><a href="{% url 'password_reset'%}">Забравена парола?</a></p>
        </div>

    </div>

</div>


{% endblock %}
