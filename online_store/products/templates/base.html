<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirela - Спално Бельо</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfcfc; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .navbar { background-color: white; border-bottom: 1px solid #eee; }
        .navbar-brand { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #333 !important; }
        .hero-section { background: url('https://mirela-bg.eu/img/home-slider/slider1.jpg') center/cover; height: 60vh; display: flex; align-items: center; color: white; margin-bottom: 3rem; }
        .product-card { border: none; transition: 0.3s; background: none; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { height: 350px; object-fit: cover; border-radius: 4px; }
        .price { color: #b08d57; font-weight: 600; font-size: 1.2rem; }
        .btn-mirela { background-color: #333; color: white; border-radius: 0; padding: 10px 25px; }
        .btn-mirela:hover { background-color: #b08d57; color: white; }
        footer { background: #1a1a1a; color: #ccc; padding: 50px 0; margin-top: 50px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">MIRELA</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                {% for category in categories %}
                <li class="nav-item">
                    <a class="nav-link text-uppercase" href="#">{{ category.name }}</a>
                </li>
                {% endfor %}
            </ul>
            <div class="d-flex align-items-center">
                <a href="#" class="text-dark me-3"><i class="bi bi-person"></i> Профил</a>
                <a href="#" class="btn btn-outline-dark position-relative">
                    Количка
                </a>
            </div>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    <div class="container text-center">
        <p>&copy; 2024 Mirela Home Textile. Всички права запазени.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
